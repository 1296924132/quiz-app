wer":"C","options":{"A":"位置在发文时间上方","B":"上不压正文","C":"上可压正文","D":"下要压年月日"},"explanation":"加盖公章是公文生效的法定标志。印章表明公文的真实性和法定效力，是公文生效的核心标识。","type":"single"},{"id":151,"question":"市税务局向社会公布征收年度税款事项，用（ ）。","answer":"B","options":{"A":"公告","B":"通告","C":"通知","D":"函"},"explanation":"公文处理工作具有政治性（体现机关意志）、规范性（严格按规范进行）、时效性（讲究时间效率）等特点。","type":"single"},{"id":152,"question":"适用于对重要事项或重大行动做出安排的公文是（ ）。","answer":"A","options":{"A":"决定","B":"命令","C":"通告","D":"批复"},"explanation":"指示性通知用于向下级机关布置工作、作出指示。'开展安全生产大检查'属于部署工作，用指示性通知。","type":"single"},{"id":153,"question":"通报和通告共同具有的一个特质是（）。","answer":"C","options":{"A":"独特性","B":"指导性","C":"知照性","D":"政策性"},"explanation":"公文语言要求准确、简明、庄重、平实，不能使用含糊、含蓄、模糊的表达方式。含蓄与公文明确性的要求不符。","type":"single"},{"id":154,"question":"收到请示，应当（ ）。","answer":"C","options":{"A":"根据事情大小或必要性来决定是否批复。","B":"根据紧急程度来决定是否批复。","C":"根据《党政机关公文处理办法》必须予以批复。","D":"根据单位领导的批办意见决定是否答复。"},"explanation":"版记部分包括抄送机关、印发机关和印发日期三个要素。主送机关和发文机关署名属于主体部分。","type":"single"},{"id":155,"question":"以下这段文字采用的说明方法是（ ）。 刺绣是我国的传统技艺之一。我国的刺绣品种主要有：苏州的苏绣，湖南的湘绣，四川的蜀绣，和广东的粤绣等。","answer":"D","options":{"A":"比较说明法","B":"定义说明法","C":"诠释说明法","D":"分类说明法"},"explanation":"这段文字采用分类说明的方法。首句总说\"刺绣是我国的传统技艺之一\"，然后按地域将刺绣品种分为苏绣、湘绣、粤绣、蜀绣四类逐一说明。分类说明使说明对象条理清晰、层次分明。","type":"single"},{"id":156,"question":"下列公文写作中，语句符合规范的是（ ）。","answer":"B","options":{"A":"经研究，县政府同意乡政府报告。","B":"我们一定要采取措施，尽可能减少不必要的开支。","C":"参加工作 15 年以上的职工，一年可享受 10 天以下的带薪旅游假。","D":"在主席台就座的还有几个先进单位的代表。"},"explanation":"公文版头部分包括发文机关标志、发文字号、签发人等。标题属于公文主体部分，不属于版头。","type":"single"},{"id":157,"question":"下列比较规范的公文标题是（ ）。","answer":"D","options":{"A":"市政府办公室关于加强毕业生就业工作。","B":"市人民政府办公室关于加强高校毕业生就业工作的通知。","C":"市人民政府办公室关于毕业生就业工作的通知。","D":"市政府办公室加强高校毕业生就业工作的通知。"},"explanation":"公文的基本构成要素包括发文机关、标题、正文等。附件不是公文的必要构成要素，有些公文不需要附件。","type":"single"},{"id":158,"question":"《 ×× 厂关于进口ＳＤ 6 型自动车床的请示》，作者是（ ）。","answer":"A","options":{"A":"×× 厂","B":"×× 厂的负责人","C":"起草文件的刘秘书","D":"签发文件的董厂长"},"explanation":"颁布性通知用于发布规章、制度、办法等。国务院发布《国家行政机关公文处理办法》是典型的颁布性通知。","type":"single"},{"id":159,"question":"根据事由： “×× 公司发行重点钢铁企业债券 ” ，应使用的文种是（ ）。","answer":"C","options":{"A":"通报","B":"通知","C":"通告","D":"决定"},"explanation":"《党政机关公文处理工作条例》规定的法定公文文种不包括'制度'。制度属于规章文书，不是法定公文。","type":"single"},{"id":160,"question":"下列哪个事由，根据《办法》，不可以使用 “ 决定 ” （ ）。","answer":"D","options":{"A":"严惩严重破坏社会治安的犯罪分子的工作安排","B":"大兴安岭森林特大火灾事故的处理","C":"授予 ××× 全国劳动模范称号的嘉奖","D":"在太平洋 × 地区试验运载火箭，使过往船只周知"},"explanation":"公文结构的基本要求是严谨（逻辑严密）、自然（顺理成章）、完整（内容全面）、统一（风格一致）。","type":"single"},{"id":161,"question":"公文要选择适宜的行文方式，一般不得（ ）。","answer":"C","options":{"A":"逐级行文","B":"多级行文","C":"越级行文","D":"直接行文"},"explanation":"发文办理的主要程序包括复核、登记、印制和核发四个环节。这是《党政机关公文处理工作条例》的明确规定。","type":"single"},{"id":162,"question":"下面选项中不属于公文特定格式的是（ ）。","answer":"D","options":{"A":"信函格式","B":"命令（令）格式","C":"纪要格式","D":"意见格式"},"explanation":"《党政机关公文格式》规定的特定格式有信函格式、命令格式和纪要格式三种。意见格式不属于特定格式。","type":"single"},{"id":163,"question":"办公室更改电话号码，可用（ ）公布周知。","answer":"B","options":{"A":"通知","B":"通告","C":"启事","D":"布告"},"explanation":"通告适用于在一定范围内公布应当遵守或者周知的事项。办公室更改电话号码需要在一定范围内告知，应用通告。","type":"single"},{"id":164,"question":"批复是答复下级请示的文件，是（ ）。","answer":"A","options":{"A":"被动发文","B":"主动发文","C":"对报告的批件","D":"下级没有请示，用来指导工作的"},"explanation":"批复用于答复下级机关的请示事项，先有请示才有批复，因此是被动发文。其他选项不符合批复的性质。","type":"single"},{"id":165,"question":"非同一系统的任何机关相互行文都使用（ ）。","answer":"B","options":{"A":"上行文","B":"平行文","C":"通知","D":"下行文"},"explanation":"命令（令）是上级对下级发布的下行文。报告、请示是上行文，函是平行文。","type":"single"},{"id":166,"question":"根据文件来源，在一个机关内部可将公文分为（ ）。","answer":"A","options":{"A":"收文、发文","B":"上行文、平行文、下行文","C":"通用公文、专业公文","D":"本机关制发的和内部使用的公文"},"explanation":"呈请性公文是指向上级请求指示或批准的公文，请示是其典型代表。决定、公告、通知均不属于呈请性公文。","type":"single"},{"id":167,"question":"属于商洽性文件的主要文种是（ ）。","answer":"C","options":{"A":"请示","B":"通知","C":"函","D":"通报"},"explanation":"函适用于不相隶属机关之间商洽工作、询问和答复问题、请求批准和答复审批事项，是商洽性文件的主要文种。通知用于传达事项，通告用于公布周知事项，请示用于向上级请求批准。","type":"single"},{"id":168,"question":"任免人员应使用的文种是（ ）。","answer":"C","options":{"A":"通报","B":"批复","C":"通知","D":"通告"},"explanation":"通报是下行文，适用于表彰先进、批评错误、传达重要精神。报告、请示是上行文，函是平行文。","type":"single"},{"id":169,"question":"某区政府向市政府请求增拨救灾资金，应用（ ）行文。","answer":"B","options":{"A":"报告","B":"请示","C":"函","D":"申请"},"explanation":"公文的版记部分包括抄送机关、印发机关和印发日期三个要素，位于公文末页最下方。","type":"single"},{"id":170,"question":"用于记载会议主要精神和议定事项的公文是（ ）。","answer":"C","options":{"A":"决议","B":"会议记录","C":"纪要","D":"议案"},"explanation":"份号是公文印制份数的顺序号（A正确）；涉密公文应当标注份号（B正确）；标注在文件首页左上角（C正确）。","type":"single"},{"id":171,"question":"以下四个标题，表述最恰当的一个（ ）。","answer":"D","options":{"A":"西陵学院对优秀学生给予表彰的通报","B":"西陵学院关于表彰优秀学生的通知","C":"西陵学院关于对优秀学生进行表彰的通报","D":"西陵学院关于表彰优秀学生的通报"},"explanation":"根据《党政机关公文处理工作条例》第五条，公文处理工作应当坚持实事求是、准确规范、精简高效、安全保密的原则。","type":"single"},{"id":172,"question":"下列事项分别适用的文种是（ ）。 （ 1 ）××县政府向社会公开发文禁止乱占耕地 （ 2 ）××教育局告知相关学校参加××会议 （ 3 ）××总公司向下属单位告知李×违反劳动纪律造成重大火灾事故的情况 （ 4 ）××大学告知校运会的具体安排","answer":"D","options":{"A":"通告、通知、决定、通知","B":"通知、通知、通报、通告","C":"通知、通告、决定、通知","D":"通告、通知、通报、通知"},"explanation":"公文用纸的上白边（天头）尺寸为37mm±1mm，这是《党政机关公文格式》规定的标准尺寸。","type":"single"},{"id":173,"question":"下列选项中不属于公文必备的基本组成部分的是（ ）。","answer":"B","options":{"A":"发文机关","B":"主送机关","C":"标题","D":"成文日期"},"explanation":"公文结构的要求包括严谨（严密逻辑）、自然（顺畅合理）、完整统一（协调一致）。以上说法均正确。","type":"single"},{"id":174,"question":"用于在一定范围内公布应当遵守或周知的事项的公文是（ ）。","answer":"D","options":{"A":"通知","B":"通告","C":"公告","D":"通报"},"explanation":"公文语言的基本要求是准确（用语精确）、简明（言简意赅）、平实（朴素实在）、庄重（郑重规范）。","type":"single"},{"id":175,"question":"公文的层次安排有（ ）、递进式、并列式。","answer":"C","options":{"A":"条文式","B":"图表式","C":"总分式","D":"点题式"},"explanation":"发文字号规范格式为：机关代字〔年份〕顺序号。A'渝府发〔2023〕1号'完全符合规范。B用圆括号错误，C多'第'字，D顺序号不应编0。","type":"single"},{"id":176,"question":"函的使用灵活简便，可广泛应用于联系各个领域，以下选项适用函的是（ ）。","answer":"B","options":{"A":"××市人民政府向××省人民政府发文请求拨给××发电厂建设经费","B":"××区人民政府就浦东新区的道路规划问题向××市交通厅询问","C":"××市公安局就打击车匪路霸问题向省公安厅提出建议","D":"最高人民法院就事业单位人事争议仲裁时效如何计算回复四川省高级人民法院"},"explanation":"函适用于不相隶属机关之间商洽工作（A正确）；大学与公司之间属于不相隶属关系，适用函（B正确）；通报可用于表彰先进（C正确）；报告是上行文（D正确）。B选项\"大学与某公司商洽合作事宜\"适用函。","type":"single"},{"id":177,"question":"按现行规定，公文标题一般使用的字号字体是（ ）。","answer":"B","options":{"A":"2号黑体字","B":"2号小标宋体字","C":"3号仿宋体字","D":"3号楷体字"},"explanation":"公文写作的特点包括写作动机的实用性（目的明确实用）、写作内容的真实性（内容真实可靠）、写作形式的规范性（格式统一规范）。","type":"single"},{"id":178,"question":"市人民政府对设立自贸区的重要事项做出决策和部署，行文应选（ ）。","answer":"C","options":{"A":"意见","B":"命令","C":"决定","D":"公告"},"explanation":"公文由份号、密级等要素组成（A正确）；标题应准确概括内容（B正确）；正文是主体部分（C正确）。","type":"single"},{"id":179,"question":"公文的标题，在任何情况下都不能省略的是（ ）。","answer":"C","options":{"A":"发文机关","B":"事由","C":"文种","D":"关于"},"explanation":"公文主体部分包括标题、主送机关、正文、附件说明、发文机关署名、成文日期和印章等。三个选项均属于主体部分。","type":"single"},{"id":180,"question":"江南小学向区公安分局请求整治校园周边治安环境，行文应选 （ ）。","answer":"D","options":{"A":"请示","B":"通知","C":"报告","D":"函"},"explanation":"通报的主要特点包括典型性（事例具有代表性）、教育性（通过典型教育引导）和时效性（要及时通报）。","type":"single"},{"id":181,"question":"必须标明份号的公文是（ ）。","answer":"A","options":{"A":"涉密公文","B":"紧急公文","C":"下行公文","D":"上行公文"},"explanation":"知照性公文是向一定范围告知事项的公文，通告是典型的知照性公文。报告和请示是呈请性公文，意见是指导性公文。","type":"single"},{"id":182,"question":"市文化局就开发文化市场向市政府提出见解和办法，行文应选 （ ）。","answer":"C","options":{"A":"报告","B":"请示","C":"意见","D":"函"},"explanation":"指示性通知用于向下级布置工作、提出要求。'开展财政资金专项检查'是部署检查工作，属于指示性通知。","type":"single"},{"id":183,"question":"市交通管理局向社会公布公交线路调整情况，行文应选 （ ）。","answer":"B","options":{"A":"决定","B":"通告","C":"公告","D":"通报"},"explanation":"公文标题一般由发文机关、事由和文种三要素组成，但在特定情况下发文机关和事由可以省略。D选项完整表述了标题组成规则。","type":"single"},{"id":184,"question":"下列格式要素中属于公文“主体”部分的是（ ）。","answer":"B","options":{"A":"发文机关标志","B":"发文机关署名","C":"印发机关和印发日期","D":"抄送机关"},"explanation":"公文主体部分包括标题、主送机关、正文、附件说明、发文机关署名、成文日期、印章等要素。D选项\"标题、主送机关、正文\"三者均属于主体部分的核心要素。","type":"single"},{"id":185,"question":"建设中学书面回复市教委询问的事项，行文应选（ ）。","answer":"C","options":{"A":"通知","B":"通报","C":"报告","D":"函"},"explanation":"公文的成文日期应使用小写汉字数字（汉字数字）标注，如'二〇二三年六月二十五日'。这是《党政机关公文格式》的明确规定。","type":"single"},{"id":186,"question":"加盖印章的公文，其成文日期的编排一般应当是（ ）。","answer":"A","options":{"A":"右空四字","B":"右空二字","C":"右齐边线","D":"在该行居中位置"},"explanation":"联合行文时，成文日期以最后签发机关负责人签发的日期为准。这体现了各联合发文单位的平等关系。","type":"single"},{"id":187,"question":"渝信学院对违纪学生分别给予批评和处分，行文应选 （ ）。","answer":"B","options":{"A":"通告","B":"通报","C":"公告","D":"公示"},"explanation":"公文处理工作主要包括公文拟制（起草、审核、签发）、公文办理（收文、发文）和公文管理三大方面。","type":"single"},{"id":188,"question":"中共重庆市委发布四届九次全会通过的重大决策，行文应选 （ ）。","answer":"D","options":{"A":"命令","B":"公告","C":"通知","D":"决议"},"explanation":"收文办理的主要程序依次为：签收、登记、初审、承办、传阅、催办、答复。这是一个完整的流程。","type":"single"},{"id":189,"question":"下列各项中，符合公文成文日期标注要求的是 （ ） 。","answer":"A","options":{"A":"2023年8月6日","B":"二〇二三年八月六日","C":"20230806","D":"2023-8-6"},"explanation":"根据《党政机关公文格式》规定，成文日期使用阿拉伯数字将年、月、日标全，年份应标全称，月、日不编虚位。A项\"2023年8月6日\"格式正确。B使用汉字数字不符合要求，C、D格式不规范。","type":"single"},{"id":190,"question":"重庆司法局向社会宣布有关法律规定的事项，行文应选（ ）。","answer":"C","options":{"A":"条例","B":"公报","C":"公告","D":"通知"},"explanation":"发文办理的最后环节是核发（分发），即将印制完成的公文进行登记、封装和分发，标志着发文办理的完成。","type":"single"},{"id":191,"question":"下列文种中，不属于党政公文主要文种的是（ ）。","answer":"D","options":{"A":"纪要","B":"批复","C":"意见","D":"公示"},"explanation":"批转性通知用于上级机关批转下级机关的公文。标题中'批转'表明是上级批转下级来文。","type":"single"},{"id":192,"question":"可以用党政公文中“议案”行文的单位是（ ）。","answer":"A","options":{"A":"大有乡人民政府","B":"中共新宇县委","C":"南方航空公司","D":"国家教育部"},"explanation":"公文主体部分包括标题、主送机关、正文、附件说明、发文机关署名、成文日期和印章等。三个选项均属于主体部分。","type":"single"},{"id":193,"question":"重庆某大学拟将市教委《关于开展大学生公文写作技能竞赛活动的通知》转发给各个院系，行文应选（ ）。","answer":"B","options":{"A":"通告","B":"通知","C":"通报","D":"意见"},"explanation":"公文审核包括审核内容是否符合法规（A正确）、格式是否规范（B正确）、语言是否准确（C正确）等多方面内容。","type":"single"},{"id":194,"question":"当主送机关过多导致公文首页不能显示正文时，正确的处理办法是（ ）。","answer":"B","options":{"A":"省略全部主送机关","B":"将主送机关移至版记部分","C":"将主送机关移至成文日期之下","D":"第一个主送机关名称后加“等”字"},"explanation":"按给定答案，公文正文层次序数第一层用'1.'。实际国家标准第一层用'一、'，但本题给定答案为C。","type":"single"},{"id":195,"question":"南华学院答复庆林公司同意租借运动场，行文应选（ ）。","answer":"A","options":{"A":"函","B":"批复","C":"通知","D":"通报"},"explanation":"公文正文层次序数第二层用'（一）'（带括号的汉字数字）。完整的层级顺序为：一、、（一）、1.、（1）。","type":"single"},{"id":196,"question":"公文如有“附注” ，应外加圆括号标注在（ ）。","answer":"C","options":{"A":"公文正文的下一行","B":"公文版记中抄送机关的下一行","C":"公文成文日期的下一行","D":"公文附件名称的下一行"},"explanation":"公文正文层次序数第三层用'1.'（阿拉伯数字加下点）。完整的层级顺序为：一、、（一）、1.、（1）。","type":"single"},{"id":197,"question":"公文具有法定的权威性，其制发必须是（ ）。","answer":"D","options":{"A":"法律部门","B":"上级机关","C":"部门领导","D":"法定作者"},"explanation":"公文正文层次序数第四层用'（1）'（带括号的阿拉伯数字）。完整的层级顺序为：一、、（一）、1.、（1）。","type":"single"},{"id":198,"question":"内容重要且紧急，要求迅速形成和处理或必须在规定的时限内办理完毕的公文是（ ）。","answer":"B","options":{"A":"特急公文","B":"加急公文","C":"平级公文","D":"常规公文"},"explanation":"根据《党政机关公文格式》规定，公文正文每面排22行。这是公文排版的规范要求。","type":"single"},{"id":199,"question":"含有重要的国家秘密，泄露会使国家的安全与利益遭受到严重损害的文件，属于（ ）。","answer":"C","options":{"A":"秘密文件","B":"绝密文件","C":"机密文件","D":"保密文件"},"explanation":"公文标题中除书名号外一般不使用标点符号。当标题中出现法规、规章、文件名称时，可以使用书名号标注。","type":"single"},{"id":200,"question":"不同的公文，其行文的目的各异，要传达的思想内容不同这就需要变换多种表达方式。下列表达方式中不适用于公文的是（）。","answer":"D","options":{"A":"叙述","B":"说明","C":"议论","D":"抒情"},"explanation":"公文标题应当准确概括主要内容（A正确）、文字简要明了（B正确）、一般由发文机关加事由加文种组成（C正确）。","type":"single"},{"id":201,"question":"下列文种不属于报请性公文的是（ ）。","answer":"D","options":{"A":"报告","B":"请示","C":"议案","D":"意见"},"explanation":"公文标注签发人一般用于上行文，这是为了明确公文责任，方便上级机关了解公文签发情况。","type":"single"},{"id":202,"question":"下列说法不正确的是（ ）。","answer":"D","options":{"A":"命令必须在宪法、法律规定的职权范围内发布。","B":"命令的内容单一，采取一文一事的形式。","C":"命令的语言不能含糊不清，模棱两可。","D":"命令采用通用的公文格式。"},"explanation":"通知是最常用的公文文种之一，'特此通知'也是公文中最为常见和通用的结尾用语。","type":"single"},{"id":203,"question":"下列选项中关于总结的说法不正确的是（ ）。","answer":"D","options":{"A":"总结在撰写的过程中可以使用形容词和程度副词。","B":"总结的主要内容是针对已经做过的事情而言的。","C":"总结不能报喜不报忧或者多报喜少报忧。","D":"按照流水账式的记法如实总结成功经验、主要问题和教训。"},"explanation":"请示和报告的主要区别在于：请示需要上级批复（有请示必批复），报告不需要上级批复（仅汇报不请求）。","type":"single"},{"id":204,"question":"简报由（ ）三部分组成。","answer":"A","options":{"A":"报头、报核、报尾","B":"版头、版心、版记","C":"开头、主体、结尾","D":"标题、正文、落款"},"explanation":"公文文种的选择需要根据具体内容和行文目的确定，严厉打击刑事犯罪活动可以用多种文种，需根据具体情况判断最合适的文种。","type":"single"},{"id":205,"question":"下列说法不正确的是（ ）。","answer":"D","options":{"A":"讲话稿的开头也称开场白。","B":"讲话稿的核心必须围绕讲话的中心问题分析和论述。","C":"讲话稿在不同层次转换之处可以穿插“同志们”或“朋友们”等称谓用语。","D":"讲话稿对社会制度、政治见解和身份特殊的人士，一般称“同志”。"},"explanation":"通知是最常用的公文文种之一，'特此通知'也是公文中最为常见和通用的结尾用语。","type":"single"},{"id":206,"question":"在规范性文件中表述惩处办法的内容应写入（ ）。","answer":"C","options":{"A":"总则","B":"分则","C":"罚则","D":"附则"},"explanation":"公文标题应当准确概括主要内容（A正确）、文字简要明了（B正确）、一般包含发文机关、事由和文种三部分（C正确）。","type":"single"},{"id":207,"question":"收文办理中的中心环节是（ ）。","answer":"C","options":{"A":"拟办","B":"批办","C":"承办","D":"注办"},"explanation":"成文日期确定规则：一般以负责人签发日期为准（A正确）；联合行文以最后签发日期为准（B正确）；会议通过以通过日期为准（C正确）。","type":"single"},{"id":208,"question":"关于电子公文下列说法正确的是（ ）。","answer":"D","options":{"A":"电子公文的服务机关是政府部门。","B":"电子公文的目标是实现办公自动化。","C":"电子公文是一种新型的电子文稿。","D":"电子公文是在一定的环境和条件下进行的。"},"explanation":"在公文上行文中，签发人姓名标注在发文字号的同一行右侧，即与发文字号在同一行并居右。","type":"single"},{"id":209,"question":"《中共中央关于印发 < 中国共产党纪律处分条例 > （试行）的通知》是（ ）。","answer":"B","options":{"A":"批转性通知","B":"发布性通知","C":"转发性通知","D":"指示性通知"},"explanation":"公文写作的特点包括实用性（有实用目的）、真实性（内容真实可靠）、规范性（格式统一规范）。艺术性不是公文写作特点。","type":"single"},{"id":210,"question":"抄送机关指（ ）。","answer":"C","options":{"A":"收文机关","B":"办理或答复收文的机关","C":"需要了解收文内容的机关","D":"必须送达的机关"},"explanation":"公文行文规范包括行文关系（机关间工作关系）、行文方向与方式（上行/下行/平行及逐级/多级/越级方式）和行文规则（遵守的规范）三个方面。","type":"single"},{"id":211,"question":"成文日期通常是指（ ）。","answer":"D","options":{"A":"草拟公文文稿的日期","B":"公文印制完毕的日期","C":"领导人在公文正本上签署的日期","D":"领导人签发文稿的日期"},"explanation":"成文日期是公文生效的法定时间。根据《党政机关公文处理工作条例》规定，公文的成文日期通常以机关负责人签发的日期为准。联合行文则以最后签发机关负责人签发的日期为准，经会议讨论通过的以通过日期为准。","type":"single"},{"id":212,"question":"公文行文规范包括三个方面的内容，其完整表述是（ ）。","answer":"D","options":{"A":"行文关系、行文方向、行文方式","B":"行文方向、行文方式、行文规则","C":"行文关系、行文方向与方式、行文规则","D":"行文关系、行文方向、行文规则"},"explanation":"公文行文规范是确保公文有序运行的重要制度，主要包括三个方面：行文关系（根据隶属关系和职权范围确定的行文主体之间的关系）、行文方向与方式（上行、下行、平行的方向及具体方式）和行文规则（一文一事、少而精等具体规则）。D选项完整表述了这三方面内容。","type":"single"}],"multis":[{"id":1,"question":"党政机关公文的时效性特点包含下列哪些方面（ ）。","answer":"ABD","options":{"A":"当代性","B":"及时性","C":"延时性","D":"效用的期限性"},"explanation":"公文时效性要求制作迅速（A✓），传递及时（B✓）和办理及时（D✓），以确保公文在有效时间内发挥作用。而'收发频繁'（C✗）描述的是公文处理的工作量特征，并非时效性的内涵。时效性强调的是时间效率，而非收发频次。","type":"multi"},{"id":2,"question":"我国现行的关于公文处理的规范性文件包括（ ）。","answer":"BD","options":{"A":"《中国共产党机关公文处理办法》","B":"《党政机关公文处理工作条例》","C":"《国家行政机关公文处理办法》","D":"《党政机关公文格式》"},"explanation":"公文处理工作具有鲜明的政治性（A✓），因为公文体现党和国家的方针政策；具有严格的规范性（B✓），必须按《党政机关公文处理工作条例》执行；具有服务性（C✓），为各级机关公务活动服务；具有时效性（D✓），要求及时处理。四项均为公文处理工作的基本特点。","type":"multi"},{"id":3,"question":"按照公文内容的性质与作用，可以将公文分为（ ）。","answer":"ABCD","options":{"A":"指挥性公文","B":"规范性公文","C":"报请性公文","D":"知照性公文"},"explanation":"命令（A✓）和决定（B✓）均由上级机关向下级机关制发，属于下行文。函（C✗）适用于不相隶属机关之间商洽工作、询问和答复问题，属于平行文。请示（D✗）适用于向上级机关请求指示和批准，属于上行文。","type":"multi"},{"id":4,"question":"公文写作之前要（ ）。","answer":"AC","options":{"A":"明确行文目的","B":"向领导请示写法","C":"确定使用的文种","D":"选择适当的语言"},"explanation":"公文写作前应明确行文目的（A✓），即为什么要发文；同时确定使用的文种（C✓），因为不同文种适用于不同情形。'向领导请示写法'（B✗）并非必要程序；'选择适当的语言'（D✗）属于写作过程中的具体操作，非写作前需要完成的事项。","type":"multi"},{"id":5,"question":"关于公文标题，下列说法错误的是（ ）。","answer":"BC","options":{"A":"公文标题包括发文机关名称、事由和文种三要素。","B":"公文标题位用 3 号方正 小标宋 。","C":"标题中不准使用任何标点符号。","D":"标题可分多行居中排布，回行时应做到词意完整、间距恰当。"},"explanation":"公文写作的四大构成要素是主题（A✓）、材料（B✓）、结构（C✓）和语言（D✓）。主题是公文的灵魂，材料是基础，结构是骨架，语言是载体，四者缺一不可，共同构成公文的完整形态。","type":"multi"},{"id":6,"question":"下列文种属于上行文的是（ ）。","answer":"AB","options":{"A":"请示","B":"报告","C":"函","D":"通报"},"explanation":"公文选材应围绕主题进行（A✓），使材料服务于主旨表达；选材要典型（B✓），以最具代表性的材料说明问题；选材要真实（C✓），确保公文可信可靠；选材要新颖（D✓），反映新情况新问题。四项原则缺一不可。","type":"multi"},{"id":7,"question":"下列文种属于下行文的有（ ）。","answer":"ABD","options":{"A":"决定","B":"批复","C":"报告","D":"通告"},"explanation":"公文结构要求严谨（A✓），逻辑严密、无懈可击；要求自然（B✓），层次分明、顺理成章；要求完整（C✓），首尾俱全、无残缺遗漏；要求统一（D✓），各部分协调一致、风格统一。四项均为公文结构的基本要求。","type":"multi"},{"id":8,"question":"关于抄送，下列说法正确的有（ ）。","answer":"ABD","options":{"A":"越级行文，应当同时抄送被越过的机关。","B":"被双重领导时，发文机关原则上主送一个上级关系，必要时抄送另一上级机关。","C":"抄送可以是上级机关、同级机关、下级机关。","D":"下行文时，主送受理机关，根据需要抄送相关机关。重要行文应当同时抄送发文机关的直接上级机关。"},"explanation":"公文常用的表达方式为叙述（A✓），用于陈述事实、交代情况；说明（B✓），用于解释事理、介绍方法；议论（D✓），用于论证观点、阐明道理。抒情（C✗）具有主观性和情感性，不符合公文客观、庄重的语言风格，故不用于公文写作。","type":"multi"},{"id":9,"question":"公文办理包括（ ）。","answer":"ABD","options":{"A":"收文办理","B":"发文办理","C":"来文办理","D":"整理归档"},"explanation":"公文语言要求准确（A✓），表意精确、无歧义；简明（B✓），言简意赅、要言不烦；平实（C✓），语言朴实、实事求是；庄重（D✓），严肃端庄、规范得体。四项是对公文语言的基本要求，缺一不可。","type":"multi"},{"id":10,"question":"下列事项能够制发通知的有（ ）。","answer":"BC","options":{"A":"某局面向社会招录大学生","B":"某厅向下级部门布置明年工作任务","C":"省政府批转并转发财政厅有关职工福利发放标准的文件","D":"两单位之间商洽某具体事项"},"explanation":"通告正文一般包括通告缘由（A✓），说明发布通告的目的和依据；通告事项（B✓），具体列出需要遵守或知晓的内容；通告结语（C✓），如'特此通告'等。附件说明（D✗）并非通告正文的必要组成部分，通告通常不附附件。","type":"multi"},{"id":11,"question":"下列文种种哪些属于上行文？（ ）","answer":"AD","options":{"A":"请示","B":"通告","C":"批复","D":"报告"},"explanation":"通知正文通常由通知缘由（B✓）、通知事项（C✓）和通知结语（D✓）三部分组成。通知缘由说明行文原因和目的，通知事项列出具体要求与内容，通知结语如'特此通知'。'通知人员'（A✗）不是通知正文的规范组成部分。","type":"multi"},{"id":12,"question":"下列事项中，可以通告行文的有（ ）。","answer":"CD","options":{"A":"某市财政局拟行文召开各区、县财政局局长会议","B":"中国人民银行告知关于国家货币出入境限额","C":"某县水务局将告知纳税人限期到指定地点进行纳税登记","D":"某市城管委告知公众二环路东三段占道房屋拆迁事项"},"explanation":"公文格式由版头（B✓）、主体（C✓）和版记（D✓）三大部分组成。版头包括发文机关标志、发文字号等；主体包括标题、正文等；版记包括抄送机关、印发机关等。'发文机关'（A✗）是具体要素而非格式组成部分的名称。","type":"multi"},{"id":13,"question":"意见分为（ ）三种。","answer":"ABC","options":{"A":"要求下级贯彻执行的意见","B":"请求上级批转的意见","C":"供平级或不相隶属机关参考的意见","D":"对重要问题提出见解和处理办法的意见"},"explanation":"综合性总结正文应包含基本情况（A✓），概述工作背景和总体情况；成绩和经验（B✓），总结取得的成果和有效做法；问题和教训（C✓），分析存在的不足和应吸取的教训；今后打算（D✓），提出改进措施和未来计划。四项均为必备内容。","type":"multi"},{"id":14,"question":"《第十二届全国人民代表大会第四次会议关于最高人民法院工作报告的决议》和中国共产党第十八届中央委员会第六次全体会议《关于召开党的第十九次全国代表大会的决议》分别属于以下哪种类型的决议（ ）。","answer":"AB","options":{"A":"审批性决议","B":"专门事项性决议","C":"决策性决议","D":"公布号召性决议"},"explanation":"党政机关公文具有法定性（A✓），由法定作者制发并具有法定效力；规范性（B✓），有统一的格式和行文规则；程序性（C✓），须履行严格的制发程序。文学性（D✗）不是公文的特点，公文语言要求平实庄重，与文学作品追求的艺术性不同。","type":"multi"},{"id":15,"question":"报告的结束语有（ ）。","answer":"","options":{"A":"以上报告，请批复","B":"以上报告，请审阅","C":"特此报告","D":"特此报请审批 E 无结语"},"explanation":"计划类文书的构成要素包括目标（A✓），明确要完成的任务和达到的标准；措施（B✓），说明实现目标的方法和途径；步骤（C✓），安排完成任务的先后顺序和时限。总结（D✗）是计划执行后的回顾性文书，不属于计划类文书的构成要素。","type":"multi"},{"id":16,"question":"情报报告的内容包括（ ）。","answer":"BC","options":{"A":"经常性的常规工作情况","B":"偶发性的特殊情况","C":"重要的社情、民情、突发事件","D":"对上级机关的查问、提问做出的答复"},"explanation":"《党政机关公文处理工作条例》规定，公文处理工作应当坚持实事求是（A✓）、准确规范（B✓）、精简高效（C✓）、安全保密（D✓）的原则。四项原则贯穿公文处理全过程，是公文处理工作的基本遵循。","type":"multi"},{"id":17,"question":"报告的注意事项是（ ）。","answer":"ACD","options":{"A":"报告的事项真实","B":"报告的事项要典型","C":"报告时间及时","D":"报告的主送机关为上级机关"},"explanation":"公文写作必须符合国家法律法规（A✓），确保合法性；坚持实事求是（B✓），反映真实情况；结构严谨（C✓），层次清晰、逻辑严密；语言规范（D✓），使用规范的公文用语。四项是对公文写作的基本要求。","type":"multi"},{"id":18,"question":"报告可用于陈述的事项有（ ）。","answer":"CD","options":{"A":"向下级或有关方面介绍工作情况","B":"答复群众的查询、提问","C":"向上级汇报工作，反映情况","D":"向上级提出今后工作整改措施"},"explanation":"公文按行文关系可分为上行文（A✓），下级向上级报送；下行文（B✓），上级向下级发送；平行文（C✓），同级或不相隶属机关之间行文。'内部文'（D✗）是按公文处理范围划分的概念，并非按行文关系分类的结果。","type":"multi"},{"id":19,"question":"下列关于工作报告与情况报告的区别，说法正确是（ ）。","answer":"AC","options":{"A":"前者多为经常性、常规性的工作，后者多为偶发性的特殊情况","B":"前者内容多不确定，后者内容比较稳定","C":"前者有不同程度的说理，事与理结合，后者重在叙述、说明情况","D":"前者无固定汇报时间，后者汇报时间固定"},"explanation":"公文版头要素包括份号（A✓），用于涉密公文管理；密级和保密期限（B✓），标注秘密等级；紧急程度（C✓），标注公文的紧急时限；发文字号（D✓），是公文的重要标识。四项均属于版头部分的构成要素。","type":"multi"},{"id":20,"question":"下列对“报告”与“请示”文种表述准确的是（ ）。","answer":"ABD","options":{"A":"报告有时一文多事，请示只能一文一事","B":"请示发出后会得到上级回应：报告发出后不一定得到上级表态","C":"报告、请示都须定期上报","D":"报告中不能夹带请示事项"},"explanation":"规范公文格式可以保证公文质量（A✓），使内容完整规范；提高办文效率（B✓），统一格式便于阅读和处理；便于公文的归档管理（C✓），标准格式利于存档检索；维护公文的严肃性（D✓），体现公文的权威和规范。四项均为规范格式的重要作用。","type":"multi"},{"id":21,"question":"以下几种机关之间，因工作需要往来公文，可以使用函的有（ ）。","answer":"ABD","options":{"A":"重庆雅士利建筑公司、重庆理工大学","B":"市财政局、市税务局","C":"省人民政府、省教育厅","D":"县公安局、乡人民政府"},"explanation":"公文审核的重点包括内容（A✓），审核政策依据、事实数据等是否准确；格式（B✓），审核格式要素是否完整规范；文字（C✓），审核语言表达是否通顺准确。装订（D✗）属于公文整理加工的物理环节，不属于审核工作的重点内容。","type":"multi"},{"id":22,"question":"下列事项中，哪些可以用通知来行文（ ）。","answer":"BCD","options":{"A":"国务院颁布一项行政法规","B":"重庆市政府拟批转卫生健康局《进一步加强新冠疫情防控力度的意见》","C":"成都市委拟向所属各级党组织布置学习××同志的“七一”讲话的有关事宜","D":"湖北省人民政府计划召开水利建设工作会，需告知相关单位事先做好准备"},"explanation":"简报具有'快'（A✓）的特点，采编迅速、传递及时；'新'（B✓），反映新情况、新问题、新经验；'实'（C✓），内容真实可靠、不虚构；'短'（D✓），篇幅短小、简明扼要。'快、新、实、短'是对简报特点的经典概括，四项全对。","type":"multi"},{"id":23,"question":"警察学院 2020 级学生王一波路见歹徒行凶抢劫挺身而出，后协助公安机关抓获歹徒。学院党委经研究决定通报表彰该学生，并要求院办秘书起草这份通报。请问，该通报的写作内容应包括（ ）。","answer":"ACD","options":{"A":"号召向王一波学习","B":"分析当前社会治安形势","C":"宣布学院党委表彰决定","D":"介绍王一波的先进事迹"},"explanation":"收文办理的主要程序包括签收和登记（A✓），确认来文并登记信息；初审和承办（B✓），审核公文并落实办理；传阅（C✓），将公文分送相关人员阅知；催办和答复（D✓），督促办理并反馈结果。四项程序依次衔接，构成完整的收文处理流程。","type":"multi"},{"id":25,"question":"某公司计划向重庆大学招聘毕业生，在其商洽函里，应该出现哪些内容？（ ）","answer":"ABCD","options":{"A":"对应聘者的具体要求","B":"简述公司对于相关人才的需要","C":"公司联系人联系方式、邮箱","D":"特此函达，请予函复为盼。"},"explanation":"命令具有强制性（A✓），受令方必须无条件执行；权威性（B✓），由国家权力机关或领导人制发；约束性（C✓），对相关单位和人员具有法律或行政约束力。随意性（D✗）与命令的严肃性、权威性相悖，不是命令的特点。","type":"multi"},{"id":26,"question":"以下哪些语句往往用于函结尾处以表示尊重对方（ ）。","answer":"AD","options":{"A":"“不知贵方意见如何，请函告”","B":"“特此批复”","C":"“请参照以上意见尽快执行”","D":"“请予以接洽是荷”"},"explanation":"公文的结尾形式丰富多样，包括总结式（A✓），对全文内容进行概括总结；号召式（B✓），发出号召、提出要求；说明式（C✓），补充说明相关事项；期望式（D✓），表达期望或恳请。四种结尾方式均可根据文种和行文目的灵活选用。","type":"multi"},{"id":27,"question":"总结与计划的区别是（ ）。","answer":"ABCD","options":{"A":"计划是事前就完成某项任务所做出的安排","B":"总结和计划是一项工作的两个方面","C":"总结还可以作为制订下一阶段计划的依据","D":"总结是事后对计划执行情况的总检查、总评价"},"explanation":"主送机关是公文的主要受理机关，可以是上级机关（A✓），如下行文的主送对象；下级机关（B✓），如上行的主送对象；平级机关（C✓），如平行文的主送对象。社会公众（D✗）不是公文的主送对象，公告、通告等面向公众的文种一般不标注主送机关。","type":"multi"},{"id":28,"question":"下列文种属于计划范畴的有（ ）。","answer":"ABCD","options":{"A":"规划","B":"纲要","C":"预测","D":"方案"},"explanation":"计划类文书包括规划（长期计划）、纲要（纲领性计划）、安排（短期安排）、要点（重点部署）、方案（具体实施方案）、设想（初步构想）等。这些都是对未来工作的预先安排和部署。","type":"multi"},{"id":29,"question":"下列党政机关公文中，属于下行文的有（ ）。","answer":"AB","options":{"A":"决议","B":"通知","C":"报告","D":"意见"},"explanation":"公文写作具有实用性（A✓），直接为公务活动服务；真实性（B✓），内容必须客观真实；规范性（C✓），格式和语言有严格规范。艺术性（D✗）不是公文写作的特点，公文写作追求准确简明、平实庄重，不以艺术表现和审美追求为目的。","type":"multi"},{"id":30,"question":"关于党政机关公文规范，下列说法正确的有（ ）。","answer":"ABCD","options":{"A":"从语言特点上，公文语言强调简明，规范，至今依然保留不少文言词汇。","B":"文种方面常见的错误，一是缺少文种；二是自制文种，使用非法定文种。","C":"公文标题的拟制，事由一般为动宾短语，减少不必要的修饰词、限定词，虚词。","D":"层次是文章结构的基本单位，是作者思路的展开和文章思想内容的表现次序。"},"explanation":"公文处理工作的基本要求是及时（A✓），不拖延、不积压；准确（B✓），内容准确、程序规范；安全（C✓），确保公文不失密、不丢失；高效（D✓），以最高效率完成处理。四项要求相互关联，共同保障公文处理工作的质量与效率。","type":"multi"},{"id":31,"question":"公文提纲的内容包括（ ）。","answer":"ABC","options":{"A":"公文标题","B":"公文开头","C":"表述层次及论点、论据、字数安排","D":"结尾"},"explanation":"公文正文中层次序数的规范使用顺序为：第一层用'一、二、三'（A✓），第二层用'（一）（二）（三）'（B✓），第三层用'1. 2. 3.'（C✓），第四层用'（1）（2）（3）'（D✓）。须严格遵循规范层级顺序。","type":"multi"},{"id":32,"question":"公文写作的基本要求有（ ）。","answer":"ABC","options":{"A":"符合党、国家的路线、 方针、 政策和法律法规","B":"一文一事，中心明确","C":"用语庄严、简明、通顺","D":"为使各方面了解情况，多印发文件 E 格式不必强求一致"},"explanation":"公文标题由发文机关（A✓）、事由（B✓）和文种（C✓）三要素组成。签发人（D✗）是版头部分的要素，用于上行文标注签发人姓名，不属于标题的组成部分。","type":"multi"},{"id":33,"question":"具备法定效力的公文稿本有（ ）。","answer":"","options":{"A":"副本","B":"草稿","C":"定稿","D":"试行本 E 暂行本"},"explanation":"公文版头部分要素包括发文机关标志（A✓）、发文字号（B✓）、签发人（C✓）、份号（D✓）。四项均为版头部分的重要要素。","type":"multi"},{"id":34,"question":"选定公文种类主要的原则方法是（ ）。","answer":"ABD","options":{"A":"考虑行文的具体需要","B":"考虑本单位的权限","C":"考虑公文撰拟者的写作水平","D":"考虑行文走向"},"explanation":"公文处理工作主要包括公文拟制（A✓）、公文办理（B✓）、公文管理（C✓）和公文归档（D✓）。四项涵盖了公文从生成到归档的全过程。","type":"multi"},{"id":35,"question":"国家对公文的格式有具体的要求其特点有（ ）。","answer":"ABC","options":{"A":"结构完整","B":"规范性","C":"相对确定性","D":"灵活性"},"explanation":"公文具有领导指导作用（A✓）、行为规范作用（B✓）、凭证依据作用（C✓）和联系沟通作用（D✓）。四项均为公文的基本作用。","type":"multi"},{"id":36,"question":"规定公文的统一规范格式，其目的在于（ ）。","answer":"ACD","options":{"A":"维护公文的严肃性","B":"维护公文的有效性","C":"维护公文的权威性","D":"维护公文的准确性"},"explanation":"通知的种类包括事务性通知（A✓）、指示性通知（B✓）、颁布性通知（C✓）和转发性通知（D✓）。四种类型覆盖了通知的主要使用场景。","type":"multi"},{"id":37,"question":"主送机关有以下几种（ ）。","answer":"ABC","options":{"A":"上级机关","B":"下级机关","C":"平行机关","D":"不相隶属机关"},"explanation":"请示写作必须坚持一文一事（A✓）、理由充分（B✓）、逐级请示（C✓）、不要多头请示（D✓）。四项要求均为确保请示得到有效处理的基本规范。","type":"multi"},{"id":38,"question":"通报有以下特点（ ）。","answer":"ABC","options":{"A":"具有较强的时效性","B":"让事实和数据说话， 而不过多地阐发和论证道理","C":"具有教育性质，主要起宣传教育、沟通情况和交流经验的作用","D":"内容单纯，行文简便"},"explanation":"报告的正文一般包括报告缘由（A✓）、报告事项（B✓）、结语（C✓）和附件说明（D✓）。四项均为报告正文的组成部分。","type":"multi"},{"id":39,"question":"通报按其内容性质划分，可分为（ ）。","answer":"ABD","options":{"A":"表彰性通报","B":"批评性通报","C":"指示性通报","D":"情况通报"},"explanation":"总结具有自我性（A✓）、回顾性（B✓）、客观性   totalAnswers: 0,     // total answer submissions
  shuffled: [],
  loopMode: false,     // loop back to start after finishing
};

// ========== INIT ==========
function init() {
  state.sessionStart = Date.now();
  setInterval(() => {
    if (document.getElementById('panelStats')?.classList.contains('active')) renderStats();
  }, 1000);
  if (QUESTION_DATA) {
    buildQuestions(QUESTION_DATA);
  } else {
    alert('题目数据加载失败，请重新下载完整版文件');
  }
}

function buildQuestions(data) {
  const mapType = { judgments: 'judgment', singles: 'single', multis: 'multi' };
  for (const [key, type] of Object.entries(mapType)) {
    for (const q of data[key] || []) {
      ALL_QUESTIONS.push({
        ...q,
        uid: `${type}-${q.id}`,
        typeLabel: type === 'judgment' ? '判断题' : type === 'single' ? '单选题' : '多选题',
      });
    }
  }
  loadState();
  updateShuffle();
  renderQuestion();
  updateStats();
}

// ========== SHUFFLE ==========
function updateShuffle() {
  let pool = ALL_QUESTIONS;
  if (state.mode !== 'all') pool = ALL_QUESTIONS.filter(q => q.type === state.mode);
  // Sort: unanswered first, then by original order
  const unanswered = pool.filter(q => !state.history[q.uid]);
  const answered = pool.filter(q => state.history[q.uid]);
  state.shuffled = [...unanswered, ...answered];
  // Reset index if out of bounds
  if (state.currentIndex >= state.shuffled.length) state.currentIndex = 0;
  if (state.shuffled.length === 0) state.currentIndex = 0;
}

// ========== NAVIGATOR ==========
function renderNav() {
  const nav = document.getElementById('qNav');
  if (!nav) return;
  const qs = state.shuffled;
  const total = qs.length;
  if (total <= 1) { nav.innerHTML = ''; return; }

  let html = '<div class="nav-title">📌 题目导航</div>';
  for (let i = 0; i < total; i++) {
    const q = qs[i];
    const hist = state.history[q.uid];
    let cls = '';
    if (i === state.currentIndex) cls = 'current';
    else if (hist) cls = hist.correct ? 'correct' : 'wrong';
    html += `<div class="nav-dot ${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
  }
  nav.innerHTML = html;
}

function jumpTo(idx) {
  state.currentIndex = idx;
  renderQuestion();
}

// ========== RENDER QUESTION ==========
function renderQuestion() {
  const area = document.getElementById('questionArea');
  const qs = state.shuffled;

  if (qs.length === 0) {
    area.innerHTML = `<div class="done-msg"><div class="icon">🎉</div>
      <h2>没有题目</h2><p>当前模式下没有可用题目</p></div>`;
    updateMiniStats();
    return;
  }

  if (state.currentIndex >= qs.length) {
    // All done
    if (state.loopMode) {
      // In loop mode: restart from beginning, preserve history
      state.currentIndex = 0;
      renderQuestion();
      updateStats();
      return;
    }
    area.innerHTML = `<div class="done-msg"><div class="icon">🎉</div>
      <h2>全部完成！</h2><p>你已经刷完了所有题目</p>
      <button class="next-btn" onclick="resetAll()">🔄 重新开始</button>
      <div style="margin-top:12px"><button class="loop-toggle active" onclick="toggleLoop();resetAll()" style="font-size:0.85rem;padding:10px 20px">
        <span class="indicator"></span> 开启循环刷题模式
      </button></div></div>`;
    updateMiniStats();
    updateProgressRing();
    return;
  }

  const q = qs[state.currentIndex];
  state.answered = false;
  state.userAnswer = null;
  state.multiSelections = [];

  const totalInMode = ALL_QUESTIONS.filter(x => state.mode === 'all' || x.type === state.mode).length;
  const pct = (state.currentIndex / Math.max(qs.length, 1)) * 100;
  const isJudgment = q.type === 'judgment';
  const isMulti = q.type === 'multi';
  const typeClass = q.type;

  let optionsHtml = '';
  if (isJudgment) {
    optionsHtml = `<div class="judgment-opts">
      <button class="opt-btn" data-val="true" onclick="answerJudgment(true)">
        <span class="opt-label circle">✓</span> 正确 <span style="font-size:0.7rem;color:var(--text-secondary);margin-left:4px">(1)</span>
      </button>
      <button class="opt-btn" data-val="false" onclick="answerJudgment(false)">
        <span class="opt-label circle">✗</span> 错误 <span style="font-size:0.7rem;color:var(--text-secondary);margin-left:4px">(2)</span>
      </button>
    </div>`;
  } else if (isMulti) {
    const letters = ['A','B','C','D'];
    optionsHtml = `<div class="options" id="multiOptions">`;
    for (const letter of letters) {
      const optText = q.options && q.options[letter] ? q.options[letter] : '';
      if (!optText) continue;
      optionsHtml += `<button class="opt-btn" data-val="${letter}" onclick="toggleMulti('${letter}')">
        <span class="opt-label square">${letter}</span>
        <span>${optText}</span>
      </button>`;
    }
    optionsHtml += `</div><div class="multi-actions">
      <button class="clear-btn" onclick="clearMulti()">清空</button>
      <button class="confirm-btn" id="confirmMulti" disabled onclick="confirmMulti()">确认提交</button>
    </div>`;
  } else {
    // Single
    const letters = ['A','B','C','D'];
    optionsHtml = `<div class="options">`;
    for (const letter of letters) {
      const optText = q.options && q.options[letter] ? q.options[letter] : '';
      if (!optText) continue;
      optionsHtml += `<button class="opt-btn" data-val="${letter}" onclick="answerSingle('${letter}')">
        <span class="opt-label circle">${letter}</span>
        <span>${optText}</span>
      </button>`;
    }
    optionsHtml += `</div>`;
  }

  area.innerHTML = `
    <div class="q-card" id="qCard">
      <div class="q-progress">
        <span class="p-text">${state.currentIndex + 1} / ${qs.length}</span>
        <div class="p-bar-wrap"><div class="p-bar" style="width:${pct}%"></div></div>
      </div>
      <div style="display:flex;align-items:start;justify-content:space-between;gap:8px">
        <span class="q-type-badge ${typeClass}">${q.typeLabel}</span>
        <button class="bookmark-btn" id="bookmarkBtn" onclick="toggleBookmark('${q.uid}')" title="收藏此题">${state.bookmarked[q.uid] ? '★' : '☆'}</button>
      </div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      <div id="optionsArea">${optionsHtml}</div>
      <div id="revealArea"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题 → <span style="font-weight:400;font-size:0.75rem">(Enter)</span></button>
      <div class="q-nav" id="qNav"></div>
    </div>
  `;

  renderNav();

  updateMiniStats();
}

// ========== ANSWER HANDLERS ==========
function answerJudgment(val) {
  if (state.answered) return;
  const q = state.shuffled[state.currentIndex];
  state.answered = true;
  state.userAnswer = val;

  const correct = val === q.answer;
  recordAnswer(q, correct, val);

  // Visual feedback
  const btns = document.querySelectorAll('.judgment-opts .opt-btn');
  btns.forEach(b => {
    b.disabled = true;
    const bVal = b.dataset.val === 'true';
    if (bVal === q.answer) b.classList.add('correct');
    if (bVal === val && !correct) b.classList.add('wrong');
  });

  showReveal(q, correct, val);
  document.getElementById('nextBtn').disabled = false;
}

function answerSingle(val) {
  if (state.answered) return;
  const q = state.shuffled[state.currentIndex];
  state.answered = true;
  state.userAnswer = val;

  const correct = val === q.answer;
  recordAnswer(q, correct, val);

  const btns = document.querySelectorAll('.options .opt-btn');
  btns.forEach(b => {
    b.disabled = true;
    const bVal = b.dataset.val;
    if (bVal === q.answer) b.classList.add('correct');
    if (bVal === val && !correct) b.classList.add('wrong');
  });

  showReveal(q, correct, val);
  document.getElementById('nextBtn').disabled = false;
}

function toggleMulti(letter) {
  if (state.answered) return;
  const idx = state.multiSelections.indexOf(letter);
  if (idx >= 0) state.multiSelections.splice(idx, 1);
  else state.multiSelections.push(letter);

  document.querySelectorAll('#multiOptions .opt-btn').forEach(b => {
    b.classList.toggle('selected', state.multiSelections.includes(b.dataset.val));
  });
  document.getElementById('confirmMulti').disabled = state.multiSelections.length === 0;
}

function clearMulti() {
  if (state.answered) return;
  state.multiSelections = [];
  document.querySelectorAll('#multiOptions .opt-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('confirmMulti').disabled = true;
}

function confirmMulti() {
  if (state.answered || state.multiSelections.length === 0) return;
  const q = state.shuffled[state.currentIndex];
  state.answered = true;
  state.userAnswer = [...state.multiSelections].sort().join('');

  const correctAns = q.answer.split('').sort().join('');
  const userAns = state.multiSelections.sort().join('');
  const correct = userAns === correctAns;
  recordAnswer(q, correct, state.multiSelections.join(''));

  // Reveal
  const btns = document.querySelectorAll('#multiOptions .opt-btn');
  btns.forEach(b => {
    b.disabled = true;
    const letter = b.dataset.val;
    if (q.answer.includes(letter)) b.classList.add('correct');
    if (state.multiSelections.includes(letter) && !q.answer.includes(letter)) b.classList.add('wrong');
  });
  document.getElementById('confirmMulti').disabled = true;

  showReveal(q, correct, state.multiSelections.sort().join(''));
  document.getElementById('nextBtn').disabled = false;
}

// ========== RECORD ANSWER ==========
function recordAnswer(q, correct, userAnswer) {
  const prev = state.history[q.uid];
  state.history[q.uid] = { correct, userAnswer, count: (prev ? prev.count + 1 : 1) };
  state.totalAnswers++;
  if (!correct) {
    state.wrongQuestions[q.uid] = { ...q, userAnswer };
  } else if (state.wrongQuestions[q.uid]) {
    delete state.wrongQuestions[q.uid];
  }
  saveState();
}

// ========== SHOW REVEAL ==========
function showReveal(q, correct, userAnswer) {
  const area = document.getElementById('revealArea');
  let ansText = '';
  if (q.type === 'judgment') {
    ansText = q.answer ? '✓ 正确' : '✗ 错误';
  } else {
    ansText = q.answer;
  }

  const isCorrect = correct;
  area.innerHTML = `
    <div class="answer-reveal ${isCorrect ? 'correct' : 'wrong'}">
      <div class="ans-label">${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</div>
      <div class="ans-text">正确答案：<strong>${ansText}</strong></div>
    </div>
    ${q.explanation ? `<div class="explanation"><div class="exp-label">📖 解析</div><div class="exp-text">${q.explanation}</div></div>` : ''}
  `;
}

// ========== NAVIGATION ==========
function nextQuestion() {
  const qs = state.shuffled;
  if (state.currentIndex < qs.length - 1) {
    state.currentIndex++;
    renderQuestion();
  } else {
    const totalUnanswered = ALL_QUESTIONS.filter(q => !state.history[q.uid]).length;
    if (totalUnanswered > 0) {
      state.currentIndex++;
      renderQuestion();
    } else if (state.loopMode) {
      // Loop mode: go back to start, preserving history
      state.currentIndex = 0;
      renderQuestion();
    } else {
      renderQuestion(); // will show "all done"
    }
  }
  updateStats();
}

function toggleLoop() {
  state.loopMode = !state.loopMode;
  document.getElementById('loopToggle').classList.toggle('active', state.loopMode);
  localStorage.setItem('quiz_loop', state.loopMode ? '1' : '0');
  // If currently on the "all done" screen, re-render to show loop option
  renderQuestion();
}

function resetAll() {
  if (!confirm('确定要重置所有进度吗？')) return;
  state.history = {};
  state.wrongQuestions = {};
  state.currentIndex = 0;
  saveState();
  updateShuffle();
  renderQuestion();
  updateStats();
}

// ========== MODE FILTER ==========
function setMode(mode) {
  state.mode = mode;
  state.currentIndex = 0;
  document.querySelectorAll('.mode-filter button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  updateShuffle();
  renderQuestion();
  updateStats();
}

// ========== TABS ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

  if (tab === 'stats') renderStats();
  if (tab === 'errors') renderErrors();
  if (tab === 'bookmarks') renderBookmarks();
}

// ========== STATS ==========
function renderStats() {
  const total = ALL_QUESTIONS.length;
  const done = Object.keys(state.history).length;
  const correct = Object.values(state.history).filter(v => v.correct).length;
  const wrong = done - correct;
  const rate = done > 0 ? Math.round((correct / done) * 100) : 0;
  const histArr = Object.values(state.history);
  const totalCount = histArr.reduce((s, v) => s + (v.count || 1), 0);
  const correctCount = histArr.reduce((s, v) => s + (v.correct ? 1 : 0), 0);
  const avgRate = state.totalAnswers > 0 ? Math.round((correctCount / state.totalAnswers) * 100) : 0;
  const bookmarked = Object.keys(state.bookmarked).length;

  document.getElementById('stTotal').textContent = total;
  document.getElementById('stDone').textContent = done;
  document.getElementById('stCorrect').textContent = correct;
  document.getElementById('stWrong').textContent = wrong;
  document.getElementById('stAttempts').textContent = state.totalAnswers;
  document.getElementById('stAvgRate').textContent = avgRate + '%';
  document.getElementById('stBookmarked').textContent = bookmarked;

  if (state.sessionStart) {
    const elapsed = Math.floor((Date.now() - state.sessionStart) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    document.getElementById('stTimer').textContent = (h > 0 ? h + '时' : '') + m + '分' + s + '秒';
  }
  updateProgressRing();
}

function updateProgressRing() {
  const done = Object.keys(state.history).length;
  const correct = Object.values(state.history).filter(v => v.correct).length;
  const rate = done > 0 ? Math.round((correct / done) * 100) : 0;
  const circumference = 314; // 2 * PI * 50
  const offset = circumference - (rate / 100) * circumference;

  const ring = document.getElementById('ringCircle');
  if (ring) {
    ring.style.strokeDasharray = `${circumference - offset} ${offset}`;
  }
  const pct = document.getElementById('ringPct');
  if (pct) pct.textContent = rate + '%';
}

// ========== ERRORS ==========
function renderErrors() {
  const list = document.getElementById('errorList');
  const entries = Object.values(state.wrongQuestions);

  if (entries.length === 0) {
    list.innerHTML = `<div class="err-empty"><div class="icon">🎉</div><p>暂无错题，继续保持！</p></div>`;
    document.getElementById('errBadge').style.display = 'none';
    return;
  }

  document.getElementById('errBadge').textContent = entries.length;
  document.getElementById('errBadge').style.display = 'inline-block';

  let html = `<div class="err-actions">
    <button class="retry-btn" onclick="retryErrors()">🔄 重新刷错题</button>
    <button onclick="clearErrors()">🗑️ 清空错题本</button>
  </div>`;

  for (const q of entries) {
    const typeClass = q.type;
    let ansText = '';
    if (q.type === 'judgment') {
      ansText = q.answer ? '正确' : '错误';
    } else {
      ansText = q.answer;
    }
    html += `<div class="err-item" onclick="goToQuestion('${q.uid}')">
      <div class="e-header">
        <span class="e-q">${escapeHtml(q.question.substring(0, 80))}${q.question.length > 80 ? '…' : ''}</span>
        <span class="e-tag ${typeClass}">${q.typeLabel}</span>
      </div>
      <div class="e-answer">
        你的答案：<span class="wrong-ans">${q.userAnswer || '-'}</span> ｜
        正确答案：<span class="correct-ans">${ansText}</span>
      </div>
    </div>`;
  }
  list.innerHTML = html;
}

function retryErrors() {
  const entries = Object.values(state.wrongQuestions);
  if (entries.length === 0) return;
  // Remove from history so they become unanswered
  for (const q of entries) {
    delete state.history[q.uid];
  }
  state.wrongQuestions = {};
  saveState();
  state.mode = 'all';
  document.querySelectorAll('.mode-filter button').forEach(b => b.classList.toggle('active', b.dataset.mode === 'all'));
  updateShuffle();
  state.currentIndex = 0;
  switchTab('practice');
  renderQuestion();
  updateStats();
}

function clearErrors() {
  if (!confirm('确定清空错题本吗？')) return;
  state.wrongQuestions = {};
  saveState();
  renderErrors();
  updateStats();
}

function goToQuestion(uid) {
  const idx = state.shuffled.findIndex(q => q.uid === uid);
  if (idx >= 0) {
    state.currentIndex = idx;
    switchTab('practice');
    renderQuestion();
  }
}

// ========== MINI STATS ==========
function updateMiniStats() {
  const total = ALL_QUESTIONS.length;
  const done = Object.keys(state.history).length;
  const correct = Object.values(state.history).filter(v => v.correct).length;
  const wrong = done - correct;
  const rate = done > 0 ? Math.round((correct / done) * 100) : 0;

  document.getElementById('msTotal').textContent = total;
  document.getElementById('msDone').textContent = done;
  document.getElementById('msCorrect').textContent = correct;
  document.getElementById('msWrong').textContent = wrong;
  document.getElementById('msRate').textContent = rate + '%';
}

function updateStats() {
  updateMiniStats();
  updateProgressRing();
  const errBadge = document.getElementById('errBadge');
  const bmBadge = document.getElementById('bmBadge');
  const bmCount = Object.keys(state.bookmarked).length;
  if (bmCount > 0) { bmBadge.textContent = bmCount; bmBadge.style.display = 'inline-block'; } else { bmBadge.style.display = 'none'; }
  const errCount = Object.keys(state.wrongQuestions).length;
  if (errCount > 0) {
    errBadge.textContent = errCount;
    errBadge.style.display = 'inline-block';
  } else {
    errBadge.style.display = 'none';
  }
}

// ========== PERSISTENCE ==========
function toggleBookmark(uid) {
  if (state.bookmarked[uid]) { delete state.bookmarked[uid]; }
  else { state.bookmarked[uid] = true; }
  saveState();
  const btn = document.getElementById('bookmarkBtn');
  if (btn) btn.textContent = state.bookmarked[uid] ? '\u2605' : '\u2606';
  updateStats();
}

function renderBookmarks() {
  const list = document.getElementById('bookmarkList');
  const uids = Object.keys(state.bookmarked);
  if (uids.length === 0) {
    list.innerHTML = '<div class="err-empty"><div class="icon">\u2b50</div><p>还没有收藏的题目<br>刷题时点击题目旁的 \u2606 即可收藏</p></div>';
    document.getElementById('bmBadge').style.display = 'none'; return;
  }
  document.getElementById('bmBadge').textContent = uids.length;
  document.getElementById('bmBadge').style.display = 'inline-block';
  const questions = uids.map(uid => ALL_QUESTIONS.find(q => q.uid === uid)).filter(Boolean);
  let h = '';
  for (const q of questions) {
    const tc = q.type;
    let at = '';
    if (q.type === 'judgment') at = q.answer ? '\u2713 正确' : '\u2717 错误';
    else at = q.answer;
    h += '<div class="err-item" onclick="goToQuestion(\'' + q.uid + '\')">' +
      '<div class="e-header"><span class="e-q">' + escapeHtml(q.question.substring(0, 80)) + (q.question.length > 80 ? '\u2026' : '') + '</span>' +
      '<span class="e-tag ' + tc + '">' + q.typeLabel + '</span></div>' +
      '<div class="e-answer">\u7b54\u6848\uff1a<span class="correct-ans">' + at + '</span>' +
      (state.history[q.uid] ? ' \uff5c \u5df2\u7b54' + (state.history[q.uid].count || 1) + '\u6b21' : ' \uff5c \u672a\u4f5c\u7b54') + '</div></div>';
  }
  list.innerHTML = h;
}

function saveState() {
  try {
    localStorage.setItem('quiz_state', JSON.stringify({
      history: state.history,
      wrongQuestions: state.wrongQuestions,
      bookmarked: state.bookmarked,
      totalAnswers: state.totalAnswers,
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('quiz_state');
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.history) state.history = saved.history;
      if (saved.wrongQuestions) state.wrongQuestions = saved.wrongQuestions;
      if (saved.bookmarked) state.bookmarked = saved.bookmarked;
      if (saved.totalAnswers) state.totalAnswers = saved.totalAnswers;
    }
    const loopVal = localStorage.getItem('quiz_loop');
    if (loopVal === '1') {
      state.loopMode = true;
      document.getElementById('loopToggle')?.classList.add('active');
    }
  } catch(e) {}
}

// ========== THEME ==========
function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('quiz_theme', isDark ? 'dark' : 'light');
}

function loadTheme() {
  const saved = localStorage.getItem('quiz_theme');
  if (saved === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
}

// ========== UTILS ==========
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== START ==========
loadTheme();

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const practicePanel = document.getElementById('panelPractice');
  if (!practicePanel.classList.contains('active')) return;

  if (e.key === 'Enter' || e.key === ' ') {
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn && !nextBtn.disabled) { nextBtn.click(); e.preventDefault(); }
    return;
  }

  // Check current question type
  const qs = state.shuffled;
  if (qs.length === 0 || state.currentIndex >= qs.length) return;
  const q = qs[state.currentIndex];

  if (q.type === 'judgment') {
    if (e.key === '1' || e.key === '✓') { answerJudgment(true); e.preventDefault(); }
    if (e.key === '2' || e.key === '✗') { answerJudgment(false); e.preventDefault(); }
  } else if (q.type === 'single') {
    const keyMap = { 'a': 'A', 'b': 'B', 'c': 'C', 'd': 'D', '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
    const mapped = keyMap[e.key.toLowerCase()];
    if (mapped) { answerSingle(mapped); e.preventDefault(); }
  } else if (q.type === 'multi') {
    const keyMap = { 'a': 'A', 'b': 'B', 'c': 'C', 'd': 'D' };
    const mapped = keyMap[e.key.toLowerCase()];
    if (mapped) { toggleMulti(mapped); e.preventDefault(); }
    if (e.key === 'Enter' && !state.answered) {
      const confirmBtn = document.getElementById('confirmMulti');
      if (confirmBtn && !confirmBtn.disabled) { confirmMulti(); e.preventDefault(); }
    }
  }
});

init();
</script>
